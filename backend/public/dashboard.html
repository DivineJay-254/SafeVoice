<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeVoice Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">SafeVoice Admin</div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link active">Reports Dashboard</a>
        <a href="#" class="nav-link" style="opacity: 0.5; cursor: not-allowed;">Settings (Soon)</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="btn btn-outline btn-block">Logout</button>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="page-header">
        <h1>Recent Reports</h1>
        <div>
          <input type="text" id="searchInput" class="form-input" placeholder="Search Code..." style="width: 250px;">
        </div>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Type</th>
                <th>Location</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="reportsTable">
              <tr>
                <td colspan="6" style="text-align: center;">Loading reports...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
