<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeVoice Admin Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div class="auth-header">
        <div class="auth-logo">🔒</div>
        <h2>Admin Portal</h2>
        <p style="color: #6b7280; font-size: 0.9rem;">Sign in to manage reports</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="admin@safevoice.org" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <div id="errorMessage" class="text-error hidden"></div>
        <button type="submit" class="btn btn-block">Sign In</button>
      </form>
      <div style="margin-top: 1rem; text-align: center; font-size: 0.8rem; color: #9ca3af;">
        Demo Credentials: admin@safevoice.org / admin123
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    checkAlreadyLoggedIn();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');
      
      errorMsg.classList.add('hidden');
      errorMsg.textContent = '';

      try {
        await login(email, password);
      } catch (err) {
        errorMsg.textContent = "Login failed. Please check credentials.";
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
